# Dependabot configuration — https://docs.github.com/en/code-security/dependabot
version: 2

updates:
  # Go modules
  - package-ecosystem: "gomod"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    reviewers:
      - "Akif-jpg"
    labels:
      - "dependencies"
      - "go"
    commit-message:
      prefix: "build(deps)"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    reviewers:
      - "Akif-jpg"
    labels:
      - "dependencies"
      - "ci"
    commit-message:
      prefix: "ci(deps)"
