name: 🐛 Bug Report
description: Report a bug or unexpected behavior in DaemonProc.
title: "[Bug]: "
labels: ["bug", "triage"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        Thank you for taking the time to report a bug! Please fill in the details below.

        > **Security vulnerabilities** should be reported privately via
        > [Security Advisories](https://github.com/gardenoftheazazil/daemonproc/security/advisories/new),
        > not through this form.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
      placeholder: Describe what happened...
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this behavior?
      placeholder: |
        1. Start the daemon with '...'
        2. Connect a peer using '...'
        3. Send a packet to '...'
        4. Observe error '...'
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened?
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: Affected Component
      description: Which part of DaemonProc is affected?
      options:
        - NAT Punching
        - Handshake / Key Exchange
        - UDP Transport
        - Unix Socket IPC
        - Encryption / Decryption
        - Peer Discovery
        - Configuration
        - Other
    validations:
      required: true

  - type: input
    id: go-version
    attributes:
      label: Go Version
      description: Output of `go version`
      placeholder: "go1.26.5 linux/amd64"
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating System
      description: OS and version
      placeholder: "Ubuntu 24.04 / Windows 11 / macOS 15"
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / Error Output
      description: Paste any relevant logs or error messages.
      render: shell
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other context, screenshots, or network diagrams.
    validations:
      required: false
