name: ✨ Feature Request
description: Suggest a new feature or enhancement for DaemonProc.
title: "[Feature]: "
labels: ["enhancement", "triage"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        Thank you for suggesting a feature! Please describe your idea below.

  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What problem does this feature solve? Is it related to a frustration?
      placeholder: "I'm always frustrated when..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe the solution you'd like to see.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Have you considered any alternative approaches?
    validations:
      required: false

  - type: dropdown
    id: component
    attributes:
      label: Related Component
      description: Which area of DaemonProc does this relate to?
      options:
        - NAT Punching
        - Handshake / Key Exchange
        - UDP Transport
        - Unix Socket IPC
        - Encryption / Decryption
        - Peer Discovery
        - Mesh / Relay Network
        - CLI / Configuration
        - Documentation
        - Other
    validations:
      required: true

  - type: dropdown
    id: scope
    attributes:
      label: Scope
      description: How large is this change?
      options:
        - Small (minor tweak, config option)
        - Medium (new API, new protocol feature)
        - Large (architectural change, new subsystem)
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any diagrams, references, or related issues.
    validations:
      required: false
