version: "2"
run:
  issues-exit-code: 1
  tests: true
output:
  formats:
    text:
      path: stdout
      print-linter-name: true
      print-issued-lines: true
linters:
  default: none
  enable:
    - bodyclose
    - copyloopvar
    - cyclop
    - dupword
    - durationcheck
    - errcheck
    - errname
    - errorlint
    - exhaustive
    - forbidigo
    - gocognit
    - gocritic
    - godot
    - goheader
    - govet
    - ineffassign
    - interfacebloat
    - intrange
    - lll
    - makezero
    - nestif
    - nilerr
    - nolintlint
    - predeclared
    - reassign
    - revive
    - staticcheck
    - thelper
    - tparallel
    - unused
    - usestdlibvars
    - wastedassign
    - whitespace
  settings:
    cyclop:
      max-complexity: 15
    errorlint:
      errorf: true
      errorf-multi: true
      asserts: true
      comparison: true
    exhaustive:
      default-signifies-exhaustive: true
    forbidigo:
      forbid:
        - pattern: ^fmt\.Print(ln|f)?$
          msg: Do not use fmt.Print/Println/Printf in production code. Use a structured logger (slog, zerolog, zap) instead.
        - pattern: ^os\.Stdout
          msg: Do not write directly to os.Stdout in production code. Use a structured logger instead.
        - pattern: ^os\.Stderr
          msg: Do not write directly to os.Stderr in production code. Use a structured logger instead.
        - pattern: ^panic$
          msg: Prefer returning an error instead of panic(). Only use panic for truly unrecoverable situations.
      exclude-godoc-examples: true
      analyze-types: true
    gocognit:
      min-complexity: 30
    gocritic:
      disabled-checks:
        - whyNoLint
        - hugeParam
      enabled-tags:
        - diagnostic
        - style
        - performance
        - opinionated
    godot:
      scope: all
      exclude:
        - ^TODO
        - ^FIXME
        - ^HACK
        - ^NOTE
        - ^BUG
        - ^XXX
        - ^nolint
    goheader:
      values:
        const:
          author: Garden of the Azazil
        regexp:
          year: 202[0-9]
      template: |-
        Copyright (c) {{year}} {{author}}. All rights reserved.
        Licensed under the AGPL-3.0 License.
        See LICENSE file in the project root for full license information.
    govet:
      disable:
        - fieldalignment
      enable-all: true
    interfacebloat:
      max: 10
    lll:
      line-length: 120
      tab-width: 4
    nestif:
      min-complexity: 5
    nolintlint:
      require-explanation: true
      require-specific: true
    revive:
      enable-all-rules: false
      rules:
        - name: exported
          arguments:
            - checkPrivateReceivers
            - disableStutteringCheck
          severity: warning
        - name: package-comments
          severity: warning
        - name: empty-block
          severity: warning
        - name: bool-literal-in-expr
          severity: warning
        - name: unnecessary-stmt
          severity: warning
        - name: empty-lines
          severity: warning
        - name: error-strings
          severity: warning
        - name: var-naming
          severity: warning
        - name: receiver-naming
          severity: warning
        - name: context-as-argument
          severity: warning
        - name: unused-parameter
          severity: warning
        - name: superfluous-else
          arguments:
            - preserveScope
          severity: warning
        - name: unreachable-code
          severity: warning
        - name: identical-branches
          severity: error
        - name: import-alias-naming
          arguments:
            - ^[a-z][a-z0-9]*$
          severity: warning
        - name: early-return
          arguments:
            - preserveScope
          severity: warning
        - name: defer
          arguments:
            - - call-chain
              - loop
          severity: warning
        - name: string-format
          severity: warning
        - name: modifies-value-receiver
          severity: warning
        - name: constant-logical-expr
          severity: warning
    staticcheck:
      checks:
        - all
    whitespace:
      multi-if: true
      multi-func: true
  exclusions:
    generated: lax
    rules:
      - linters:
          - cyclop
          - errcheck
          - forbidigo
          - gocognit
          - gocritic
          - goheader
          - lll
          - nestif
          - revive
        path: _test\.go$
      - linters:
          - gocritic
          - goheader
          - lll
          - revive
          - staticcheck
        path: generated
      - linters:
          - forbidigo
        path: main\.go$
      - linters:
          - lll
        path: doc\.go$
      - linters:
          - cyclop
        path: (.+)_test\.go
    paths:
      - third_party$
      - builtin$
      - examples$
issues:
  max-issues-per-linter: 0
  max-same-issues: 0
severity:
  default: warning
  rules:
    - linters:
        - bodyclose
        - errcheck
        - govet
        - nilerr
        - staticcheck
      severity: error
    - linters:
        - godot
        - lll
        - revive
        - staticcheck
      severity: warning
    - linters:
        - cyclop
        - gocognit
        - gocritic
        - nestif
      severity: info
formatters:
  enable:
    - gci
    - gofmt
    - goimports
  settings:
    gci:
      sections:
        - standard
        - default
        - prefix(github.com/gardenoftheazazil)
      custom-order: true
    goimports:
      local-prefixes:
        - github.com/gardenoftheazazil
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
